<script>
// ============== DEMO DATA ==============
const site = { name: "Kalol Sanand", code: "SITE/2026/001", chainageEnd: 27000, bucketSize: 100, buckets: 270, se: "Kiran Shah" };

const layers = [
  { key: "GSB",  name: "Granular Sub-Base", weight: 1, cls: "gsb" },
  { key: "WMM",  name: "Wet Mix Macadam",   weight: 1, cls: "wmm" },
  { key: "BM",   name: "Bituminous Macadam",weight: 1, cls: "bm"  },
  { key: "DBM",  name: "Dense Bituminous Macadam", weight: 1, cls: "dbm" },
  { key: "BC",   name: "Bituminous Concrete",      weight: 1, cls: "bc"  },
  { key: "SDBC", name: "Semi-Dense Bit. Concrete", weight: 1, cls: "sdbc"},
  { key: "CC",   name: "Cement Concrete",           weight: 1, cls: "cc"  },
];

const progressEntries = [
  { code:"PRG/2026/0001", date:"2026-04-10", cStart:0,    cEnd:1000, side:"LHS", layer:"GSB",  status:"Complete",    pct:100, photos:2, state:"Verified" },
  { code:"PRG/2026/0002", date:"2026-04-11", cStart:1000, cEnd:2000, side:"LHS", layer:"GSB",  status:"Complete",    pct:100, photos:1, state:"Verified" },
  { code:"PRG/2026/0003", date:"2026-04-12", cStart:2000, cEnd:2500, side:"LHS", layer:"GSB",  status:"In Progress", pct:60,  photos:2, state:"Verified" },
  { code:"PRG/2026/0004", date:"2026-04-13", cStart:0,    cEnd:800,  side:"LHS", layer:"WMM",  status:"Complete",    pct:100, photos:1, state:"Verified" },
  { code:"PRG/2026/0005", date:"2026-04-14", cStart:800,  cEnd:1200, side:"LHS", layer:"WMM",  status:"In Progress", pct:70,  photos:2, state:"Verified" },
  { code:"PRG/2026/0006", date:"2026-04-15", cStart:0,    cEnd:500,  side:"LHS", layer:"BM",   status:"Complete",    pct:100, photos:3, state:"Verified" },
  { code:"PRG/2026/0007", date:"2026-04-16", cStart:500,  cEnd:700,  side:"LHS", layer:"BM",   status:"In Progress", pct:40,  photos:1, state:"Verified" },
  { code:"PRG/2026/0008", date:"2026-04-17", cStart:0,    cEnd:300,  side:"LHS", layer:"DBM",  status:"In Progress", pct:50,  photos:1, state:"Submitted" },
  { code:"PRG/2026/0009", date:"2026-04-18", cStart:0,    cEnd:300,  side:"LHS", layer:"CC",   status:"Complete",    pct:100, photos:1, state:"Submitted" },
  { code:"PRG/2026/0010", date:"2026-04-19", cStart:1500, cEnd:1700, side:"RHS", layer:"GSB",  status:"Complete",    pct:100, photos:0, state:"Submitted" },
  { code:"PRG/2026/0011", date:"2026-04-20", cStart:0,    cEnd:200,  side:"LHS", layer:"BC",   status:"In Progress", pct:25,  photos:2, state:"Submitted" },
  { code:"PRG/2026/0012", date:"2026-04-21", cStart:200,  cEnd:400,  side:"LHS", layer:"DBM",  status:"In Progress", pct:30,  photos:1, state:"Draft" },
];

// Compute bucket state matrix
function buildBuckets(side) {
  const matrix = {};
  layers.forEach(l => {
    matrix[l.key] = Array(site.buckets).fill(0); // 0 = not started
  });
  progressEntries
    .filter(e => e.side === side || e.side === "Both")
    .forEach(e => {
      const startIdx = Math.floor(e.cStart / site.bucketSize);
      const endIdx = Math.ceil(e.cEnd / site.bucketSize);
      for (let i = startIdx; i < endIdx && i < site.buckets; i++) {
        const cur = matrix[e.layer][i];
        if (e.pct > cur) matrix[e.layer][i] = e.pct;
      }
    });
  return matrix;
}

const verifyQueue = {
  dumping: [
    { code:"DMP/2026/0005", type:"Dumping", date:"2026-04-16 10:00", desc:"WMM 20.0 MT — km 1.0-1.2 (LHS) from Magodi Plant", by:"Mahesh Desai", age:"1d 22h", stale:true },
    { code:"DMP/2026/0006", type:"Dumping", date:"2026-04-16 14:30", desc:"Steel 12mm 3.0 MT — km 1.2-1.4 (RHS) from Khatraj Chokdi Camp", by:"Mahesh Desai", age:"1d 18h" },
    { code:"DMP/2026/0007", type:"Dumping", date:"2026-04-17 08:00", desc:"Aggregate 20mm 8.0 MT — km 1.6-1.8 (LHS) from Khatraj Chokdi", by:"Mahesh Desai", age:"23h ago" },

    { code:"DMP/2026/0009", type:"Dumping", date:"2026-04-21 09:00", desc:"Aggregate 10mm 15.0 MT — km 2.5-2.7 (LHS)", by:"Mahesh Desai", age:"4h ago" },
  ],
  camp: [
    { code:"CIN/2026/0006", type:"Camp Inward", date:"2026-04-17 07:50", desc:"Aggregate 20mm 22.0 MT from Magodi Plant", by:"Suresh Rathod", age:"23h ago" },
    { code:"COUT/2026/0004", type:"Camp Outward", date:"2026-04-17 07:15", desc:"Aggregate 20mm 8.0 MT → Kalol Sanand", by:"Suresh Rathod", age:"1d 3h" },
    { code:"LAB/2026/0002", type:"Camp Labor", date:"2026-04-17", desc:"Ramesh Mukadam — 8 workers (Shuttering)", by:"Suresh Rathod", age:"1d 4h" },
    { code:"SHT/2026/0003", type:"Shuttering", date:"2026-04-16", desc:"Return 20× Steel Plate from Kalol Sanand", by:"Suresh Rathod", age:"2d 3h", stale:true },
  ],
  plant: [
    { code:"PIN/2026/0005", type:"Plant Raw Inward", date:"2026-04-15 11:30", desc:"Cement 25.0 MT from Ambuja Cement", by:"Pravin Modi", age:"5d 22h", stale:true },
    { code:"PPRD/BIT/2026/0002", type:"Production", date:"2026-04-16 09:30", desc:"DBM 12.0 MT (all inputs within ±3% variance)", by:"Pravin Modi", age:"1d 20h" },
    { code:"PPRD/BIT/2026/0003", type:"Production", date:"2026-04-17 09:00", desc:"BC 8.0 MT — ⚠️ Agg 20mm variance +10.7%", by:"Pravin Modi", age:"23h ago", flagged:true },
    { code:"PPRD/RMC/2026/0001", type:"Production", date:"2026-04-16 11:00", desc:"M25 Concrete 5.0 m³", by:"Pravin Modi", age:"1d 18h" },
    { code:"POUT/2026/0004", type:"Plant Outward", date:"2026-04-17 10:15", desc:"BC 8.0 MT → Kalol Sanand", by:"Pravin Modi", age:"22h ago" },
  ]

// ============== ROUTING ==============
const sidebarItems = document.querySelectorAll('.sidebar-item');
const mainEl = document.getElementById('main');

function setBreadcrumb(parts) { breadcrumbEl.innerHTML = parts.map(p=>p).join(' <span>&rsaquo;</span> '); }

function renderView(view) {
  switch(view) {
    case 'home': renderHome(); break;
    case 'entry': renderEntryForm(); break;
    case 'bulk': renderBulkGrid(); break;
    case 'strip': renderStrip(); break;
    case 'layers': renderLayerSummary(); break;
    case 'history': renderHistory(); break;
    case 'verify': renderVerifyQueue(); break;
    default: renderHome();
  }
}

function stateBadge(s) { const key = s.toLowerCase().replace(/\s/g,''); return `<span class="badge badge-${key}">${s}</span>`; }
function statusBadge(s, p) {
  if (s === 'Complete') return `<span class="badge badge-complete">✅ Complete 100%</span>`;
  if (s === 'In Progress') return `<span class="badge badge-progress">⚙ In Progress ${p}%</span>`;
  return `<span class="badge badge-notstarted">⬜ Not Started</span>`;
}
function layerBadge(k) { const l = layers.find(x=>x.key===k); return `<span class="badge badge-${l?.cls||'info'}">${k}</span>`; }

function pctToClass(pct) {
  if (pct === 0) return 'c-ns';
  if (pct >= 100) return 'c-done';
  if (pct <= 33) return 'c-ip1';
  if (pct <= 66) return 'c-ip2';
  return 'c-ip3';
}

// ============== STRIP VIEW ==============
function renderStripGrid(side, mini) {
  const buckets = buildBuckets(side);
  const cols = site.buckets;
  const cellsPerKm = 1000 / site.bucketSize;
  let kmMarkers = '';
  for (let km = 0; km <= 27; km += (mini ? 3 : 1)) {
    const col = km * cellsPerKm + 2; // +2 because grid-column is 1-indexed and col 1 is the row label
    kmMarkers += `<div style="grid-column:${col}; grid-row:1; font-size:9px; color:#8a8f99; text-align:center; padding:2px 0;">${km}km</div>`;
  }

  return `
    <div class="strip-legend">
      <div class="legend-cell"><div class="legend-swatch" style="background:#e0e2e7"></div>Not Started</div>
      <div class="legend-cell"><div class="legend-swatch" style="background:#f4a261"></div>1–33%</div>
      <div class="legend-cell"><div class="legend-swatch" style="background:#f4c430"></div>34–66%</div>
      <div class="legend-cell"><div class="legend-swatch" style="background:#8bc34a"></div>67–99%</div>
      <div class="legend-cell"><div class="legend-swatch" style="background:#198754"></div>Complete 100%</div>
    </div>
    <div class="strip-grid" style="--cols:${cols}; grid-template-columns: 64px repeat(${cols}, 1fr);">
      ${kmMarkers}
      ${layers.map((l, li) => {
        const row = li + 2;
        let cells = `<div class="strip-row-label" style="grid-row:${row}">${l.key}</div>`;
        for (let i = 0; i < cols; i++) {
          const pct = buckets[l.key][i];
          const cls = pctToClass(pct);
          const kmLo = (i * site.bucketSize / 1000).toFixed(1);
          const kmHi = ((i+1) * site.bucketSize / 1000).toFixed(1);
          const statusText = pct === 0 ? 'Not Started' : pct === 100 ? 'Complete' : 'In Progress ' + pct + '%';
          cells += `<div class="strip-cell ${cls}" style="grid-column:${i+2}; grid-row:${row}" data-tip="${l.key} @ km ${kmLo}–${kmHi} (${side}) — ${statusText}"></div>`;
        }
        return cells;
      }).join('')}
    </div>
  `;
}

function wireStripTooltips() {
  const tt = document.getElementById('tooltip');
  document.querySelectorAll('.strip-cell').forEach(cell => {
    cell.addEventListener('mousemove', e => {
      const tip = cell.dataset.tip;
      if (!tip) return;
      tt.textContent = tip;
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 14) + 'px';
      tt.style.top = (e.clientY + 14) + 'px';
    });
    cell.addEventListener('mouseleave', () => { tt.style.display = 'none'; });
  });
}

function renderLayerSummary() {
  setBreadcrumb(['Work Progress', 'Layer-Wise Summary']);
  const buckets = buildBuckets('LHS');
  const rowsHtml = layers.map(l => {
    const arr = buckets[l.key];
    const complete = arr.filter(p=>p===100).length;
    const inProg = arr.filter(p=>p>0 && p<100);
    const notStart = arr.filter(p=>p===0).length;
    const sum = arr.reduce((a,b)=>a+b,0);
    const pct = (sum / (site.buckets*100)) * 100;
    const avgInProg = inProg.length ? (inProg.reduce((a,b)=>a+b,0) / inProg.length).toFixed(0) : 0;
    return `
      <div class="layer-row">
        <div class="layer-label">${layerBadge(l.key)}</div>
        <div class="layer-bar"><div class="layer-fill ${pct>=100?'done':''}" style="width:${Math.max(pct,1)}%"></div></div>
        <div class="layer-stats">${complete} done · ${inProg.length} in prog @ ${avgInProg}% · ${notStart} not started</div>
        <div class="layer-pct">${pct.toFixed(1)}%</div>
      </div>
    `;
  }).join('');

  let cumSum = 0, cumCount = 0;
  layers.forEach(l => {
    const sum = buckets[l.key].reduce((a,b)=>a+b,0);
    cumSum += (sum / (site.buckets*100)) * 100 * l.weight;
    cumCount += l.weight;
  });
  const cumulative = cumSum / cumCount;

  mainEl.innerHTML = `

      <div>

    <div class="info-banner"><strong>Verification never blocks.</strong> Submitted entries are already live in stock / reports / dashboard. Variance ⚠️ and stale (🕒 &gt;24h) rows warrant closer review.</div>
    <div class="tabs">
      ${Object.keys(tabs).map(k => `<div class="tab ${activeVerifyTab===k?'active':''}" onclick="activeVerifyTab='${k}';renderVerifyQueue()">${tabs[k]} <span style="background:#dc3545;color:#fff;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:700;margin-left:6px">${counts[k]}</span></div>`).join('')}
    </div>
    <div class="toolbar">
      <input class="search-input" placeholder="Search..." />
      <span class="filter-chip active">All</span><span class="filter-chip">⚠️ Flagged</span><span class="filter-chip">🕒 Stale (&gt;24h)</span>
    </div>
    <div class="table-container">
      <table>
        <thead><tr><th><input type="checkbox"></th><th>Code</th><th>Type</th><th>Date</th><th>Description</th><th>Entered By</th><th>Age</th><th>Actions</th></tr></thead>
        <tbody>${data.map(v=>`
          <tr style="${v.stale?'background:#fff9e6':v.flagged?'background:#fdf0e6':''}">
            <td><input type="checkbox"></td>
            <td><strong>${v.code}</strong>${v.flagged?' ⚠️':''}${v.stale?' 🕒':''}</td>
            <td><span class="badge badge-info">${v.type}</span></td>
            <td>${v.date}</td>
            <td>${v.desc}</td>
            <td>${v.by}</td>
            <td class="${v.stale?'age-stale':''}">${v.age}</td>
            <td>
              <div class="verify-actions">
                <button class="btn btn-success" style="padding:4px 10px; font-size:12px" onclick="event.stopPropagation(); alert('Verified: '+this.closest('tr').querySelector('strong').textContent)">✅ Verify</button>
                <button class="btn btn-secondary" style="padding:4px 10px; font-size:12px" onclick="event.stopPropagation(); alert('Correction requested')">✏️ Correct</button>
              </div>
            </td>
          </tr>`).join('')}</tbody>
      </table>
    </div>
    <div class="warn-banner" style="margin-top:14px">${[...verifyQueue.dumping, ...verifyQueue.camp, ...verifyQueue.plant].filter(v=>v.stale).length} entries stale (&gt;24h) &bull; ${[...verifyQueue.dumping, ...verifyQueue.camp, ...verifyQueue.plant].filter(v=>v.flagged).length} flagged for variance. Review recommended.</div>
  `;
}

// ============== INIT ==============
renderHome();
</script>
</body>
</html>
