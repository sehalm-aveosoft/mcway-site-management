  .activity-icon.out { background: #fddede; }

  .activity-icon.labor { background: #d4e5f7; }
  .activity-icon.shut { background: #fde9d4; }

  .stock-bar { height: 6px; background: #e0e2e7; border-radius: 3px; overflow: hidden; width: 80px; display: inline-block; vertical-align: middle; margin-left: 8px; }
  .stock-bar-fill { height: 100%; border-radius: 3px; }
  .input-row { display: grid; grid-template-columns: 2fr 1fr 1fr 40px; gap: 8px; padding: 8px 10px; background: #fafbfc; border-radius: 4px; margin-bottom: 6px; align-items: end; }

  .photo-upload { border: 2px dashed #d8dae0; border-radius: 6px; padding: 20px; text-align: center; color: #8a8f99; cursor: pointer; }
  .photo-upload:hover { border-color: #2d6a4f; color: #2d6a4f; }
  .verify-actions { display: flex; gap: 6px; }

sidebarItems.forEach(item => {

    sidebarItems.forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    renderView(item.dataset.view);
  });
});

function setBreadcrumb(parts) { breadcrumbEl.innerHTML = parts.map(p=>p).join(' <span>&rsaquo;</span> '); }

function renderView(view, detail) {
  switch(view) {
    case 'home': renderHome(); break;
    case 'inward': detail==='form' ? renderInwardForm() : renderInwardList(); break;
    case 'outward': detail==='form' ? renderOutwardForm() : renderOutwardList(); break;
    case 'stock': detail==='ledger' ? renderStockLedger() : renderStockSummary(); break;
    case 'rmc': detail==='form' ? renderRmcForm() : renderRmcList(); break;
    case 'labor': detail==='form' ? renderLaborForm() : renderLaborList(); break;
    case 'shuttering': detail==='form' ? renderShutteringForm() : detail==='register' ? renderShutteringRegister() : renderShutteringList(); break;
    case 'verify': renderVerifyQueue(); break;
    default: renderHome();

function toggleSourceField() {
  const v = document.getElementById('srcType').value;
  document.getElementById('srcPlant').style.display = v==='Plant' ? '' : 'none';
  document.getElementById('srcVendor').style.display = v!=='Plant' ? '' : 'none';
}

function calcNet() {
  const g = parseFloat(document.getElementById('gross').value) || 0;
  const t = parseFloat(document.getElementById('tare').value) || 0;
  const n = g - t;
  document.getElementById('netWt').value = n >= 0 ? n.toFixed(2) : 'ERROR: Negative!';
  document.getElementById('netWt').style.color = n >= 0 ? '#6c7080' : '#dc3545';
}

          const barColor = cls === 'badge-critical' ? '#dc3545' : cls === 'badge-low' ? '#ffc107' : '#198754';
          return `<tr onclick="renderView('stock','ledger')">
            <td><strong>${s.material}</strong></td>
            <td>${s.variant}</td>
            <td>${s.uom}</td>
            <td>${s.opening}</td>
